services:
  - type: web
    name: sidequest-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sidequest_db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

  - type: web
    name: sidequest-frontend
    env: static
    plan: free
    buildCommand: npm install && npm run build
    publishPath: dist

databases:
  - name: sidequest_db
    plan: free
