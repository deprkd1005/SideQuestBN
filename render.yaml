services:
  - type: web
    name: sidequest-backend
    env: node
    plan: free
    buildCommand: npm install && npx prisma db push --accept-data-loss
    startCommand: node server/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

  - type: web
    name: sidequest-frontend
    env: static
    plan: free
    buildCommand: npm install && npm run build
    publishPath: dist
